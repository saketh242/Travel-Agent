<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="logo" aria-hidden="true">
          <!-- Simple, lightweight SVG logo -->
          <svg
            width="56"
            height="56"
            viewBox="0 0 64 64"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            role="img"
            aria-label="Travel logo"
          >
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#0ea5a4" />
                <stop offset="100%" stop-color="#7c3aed" />
              </linearGradient>
            </defs>
            <rect width="64" height="64" rx="12" fill="url(#g)" />
            <path
              d="M20 40c6-6 12-12 24-16"
              stroke="rgba(255,255,255,0.95)"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <circle cx="44" cy="18" r="3.6" fill="rgba(255,255,255,0.95)" />
          </svg>
        </div>

        <div class="header-text">
          <p class="eyebrow">AI travel crew</p>
          <h1>Plan your next trip</h1>
          <p class="subtitle">
            Weather, flights, hotels, and sights — one answer from specialist
            agents.
          </p>
        </div>
      </header>

      <main class="card">
        <form id="plan-form" class="form">
          <label for="query">Where and when do you want to go?</label>
          <textarea
            id="query"
            name="query"
            rows="4"
            placeholder="e.g. I want to visit Tokyo in July for a week. What should I pack?"
            required
          ></textarea>

          <div class="chips" aria-label="Example queries">
            <button
              type="button"
              class="chip"
              data-example="Plan a trip to Paris in May. Budget and mid-range hotels?"
            >
              Paris · May
            </button>
            <button
              type="button"
              class="chip"
              data-example="Dubai in August — weather, flights, and top places."
            >
              Dubai · August
            </button>
            <button
              type="button"
              class="chip"
              data-example="New York in December. What clothes should I pack?"
            >
              New York · December
            </button>
          </div>

          <button type="submit" class="submit" id="submit-btn">
            <span class="btn-label">Generate plan</span>
            <span class="spinner" hidden aria-hidden="true"></span>
          </button>
        </form>

        <p id="error" class="error" role="alert" hidden></p>

        <section id="result" class="result" hidden>
          <h2>Your plan</h2>
          <article id="plan-output" class="plan-output"></article>
        </section>
      </main>

      <footer class="footer">
        <span>Supported cities: Tokyo, Paris, Dubai, New York, Sydney</span>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
